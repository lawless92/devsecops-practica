title = "gitleaks config"

[[rules]]
    id = "aws-access-key"
    description = "AWS Access Key"
    regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
    keywords = ["akia", "agpa", "aida", "aroa", "aipa", "anpa", "anva", "asia"]

[[rules]]
    id = "aws-secret-key"
    description = "AWS Secret Key"
    regex = '''(?i)aws(.{0,20})?['"][0-9a-zA-Z\/+]{40}['"]'''
    keywords = ["aws", "secret"]

[[rules]]
    id = "github-pat"
    description = "GitHub Personal Access Token"
    regex = '''ghp_[0-9a-zA-Z]{36}'''
    keywords = ["ghp"]

[[rules]]
    id = "github-ssh-key"
    description = "GitHub SSH private key"
    regex = '''-----BEGIN OPENSSH PRIVATE KEY-----'''
    keywords = ["openssh"]

[[rules]]
    id = "generic-api-key"
    description = "Generic API Key"
    regex = '''(?i)(api_key|apikey|secret|password|token)(.{0,20})?['"][0-9a-zA-Z]{16,45}'''
    keywords = ["api_key", "apikey", "secret", "password", "token"]

[[rules]]
    id = "private-key"
    description = "Private Key"
    regex = '''-----BEGIN\s+(([A-Z0-9\s]+)\s+)?PRIVATE\s+KEY-----'''
    keywords = ["-----begin"]

[[rules]]
    id = "google-api-key"
    description = "Google API Key"
    regex = '''AIza[0-9A-Za-z\\-_]{35}'''
    keywords = ["aiza"]

[[rules]]
    id = "slack-webhook"
    description = "Slack Webhook"
    regex = '''https://hooks.slack.com/services/T[a-zA-Z0-9_]{8}/B[a-zA-Z0-9_]{8}/[a-zA-Z0-9_]{24}'''
    keywords = ["hooks.slack.com"]

[allowlist]
    description = "whitelist global"
    paths = ['''gitleaks.toml''']